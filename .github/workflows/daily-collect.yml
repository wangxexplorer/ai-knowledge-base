name: Daily AI Knowledge Collection

on:
  schedule:
    - cron: '0 8 * * *'  # UTC 08:00 = Beijing 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate and quality-check articles
        run: |
          shopt -s nullglob
          ARTICLES=(knowledge/articles/*.json)
          shopt -u nullglob

          if [ ${#ARTICLES[@]} -eq 0 ]; then
            echo "No article files found. Nothing to validate."
            exit 0
          fi

          echo "Validating ${#ARTICLES[@]} article(s)…"
          python hooks/validate_json.py "${ARTICLES[@]}"

          echo "Checking quality of ${#ARTICLES[@]} article(s)…"
          python hooks/check_quality.py "${ARTICLES[@]}"

      - name: Commit and push new articles
        run: |
          git add knowledge/

          ARTICLE_COUNT=$(git diff --cached --name-only --diff-filter=A knowledge/articles/ | wc -l)
          if [ "$ARTICLE_COUNT" -eq 0 ]; then
            echo "No new articles to commit. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Collect ${ARTICLE_COUNT} article(s) ($(date +%Y-%m-%d))"
          git push
