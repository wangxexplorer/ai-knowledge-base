name: Daily AI Knowledge Collection

on:
  schedule:
    - cron: '0 8 * * *'  # UTC 08:00 = Beijing 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
          echo "::notice::Pipeline finished"

      - name: Validate article structure
        if: always()
        run: |
          set -e
          if [ ! -d knowledge/articles ]; then
            echo "::notice::knowledge/articles/ directory does not exist, skipping validation"
            exit 0
          fi
          shopt -s nullglob
          ARTICLES=(knowledge/articles/*.json)
          shopt -u nullglob
          if [ ${#ARTICLES[@]} -eq 0 ]; then
            echo "::notice::No article files to validate"
            exit 0
          fi
          echo "Validating ${#ARTICLES[@]} article(s)…"
          python hooks/validate_json.py "${ARTICLES[@]}"

      - name: Quality check (advisory only)
        if: always()
        run: |
          if [ ! -d knowledge/articles ]; then
            exit 0
          fi
          shopt -s nullglob
          ARTICLES=(knowledge/articles/*.json)
          shopt -u nullglob
          if [ ${#ARTICLES[@]} -eq 0 ]; then
            exit 0
          fi
          echo "Checking quality of ${#ARTICLES[@]} article(s)…"
          python hooks/check_quality.py "${ARTICLES[@]}" || echo "::warning::Quality check found Grade C entries — review recommended"

      - name: Commit and push new articles
        if: always()
        run: |
          set -e
          if [ ! -d knowledge ]; then
            echo "::notice::No knowledge/ directory, nothing to commit"
            exit 0
          fi
          git add knowledge/ 2>/dev/null || true
          ARTICLE_COUNT=$(git diff --cached --name-only --diff-filter=A knowledge/articles/ 2>/dev/null | wc -l)
          if [ "$ARTICLE_COUNT" -eq 0 ]; then
            echo "::notice::No new articles to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Collect ${ARTICLE_COUNT} article(s) ($(date +%Y-%m-%d))"
          git pull --rebase origin master
          git push
